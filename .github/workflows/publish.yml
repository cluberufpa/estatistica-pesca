name: Publicar web-book

# Publica automaticamente a cada push na branch principal.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: false   # não precisamos de LaTeX: usamos Typst

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Instale aqui os pacotes que seus chunks usam de fato.
      - name: Instalar pacotes R
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::readxl
            any::car
            any::knitr
            any::rmarkdown

      - name: Renderizar o book (HTML)
        run: quarto render --to html

      # Renderiza também o PDF via Typst e o coloca em /docs para download.
      - name: Renderizar o book (PDF/Typst)
        run: quarto render --to typst || echo "PDF opcional — seguir mesmo se falhar"

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
