name: Publicar web-book

# Publica automaticamente a cada push na branch principal.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Instalar Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: false   # não precisamos de LaTeX: usamos Typst

      - name: Instalar R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Como o web-book está com `execute: eval: false`, os pacotes R
      # não são estritamente necessários para o render. Mantemos a
      # instalação para o caso de você ligar `eval: true` em algum
      # capítulo no futuro.
      - name: Instalar pacotes R
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::readxl
            any::car
            any::knitr
            any::rmarkdown

      - name: Garantir estilo ABNT (abnt.csl)
        run: |
          if [ ! -f abnt.csl ]; then
            curl -L -o abnt.csl https://raw.githubusercontent.com/citation-style-language/styles/master/associacao-brasileira-de-normas-tecnicas.csl
          fi

      # IMPORTANTE: renderiza PDF PRIMEIRO; HTML depois.
      # O HTML precisa ser o último a escrever em docs/, pois é ele
      # quem o GitHub Pages vai servir como site.
      - name: Renderizar PDF (Typst) — opcional
        run: quarto render --to typst
        continue-on-error: true   # se o PDF falhar, segue o HTML

      - name: Renderizar HTML (site) — obrigatório
        run: quarto render --to html

      - name: Verificar se docs/index.html existe
        run: |
          if [ ! -f docs/index.html ]; then
            echo "ERRO: docs/index.html nao foi gerado. Abortando publicacao."
            ls -la docs/ || true
            exit 1
          fi
          echo "OK: docs/index.html encontrado."
          ls -la docs/ | head -20

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true   # mantem a branch gh-pages limpa a cada deploy
